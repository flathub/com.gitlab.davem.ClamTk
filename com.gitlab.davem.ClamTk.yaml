app-id: com.gitlab.davem.ClamTk
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: clamtk
rename-icon: clamtk
copy-icon: true
finish-args:
  - '--filesystem=host'
  - '--share=ipc'
  - '--share=network'
  - '--socket=fallback-x11'
  - '--socket=wayland'
modules:
  # Based on https://github.com/flathub/io.github.Hexchat.Plugin.Perl
  - name: perl
    no-autogen: true
    config-opts:
      - '-des'
      - '-Duseshrplib'
    build-options:
      cflags: '-fPIC'
      ldflags: '-fpic'
    sources:
      - type: archive
        url: https://www.cpan.org/src/5.0/perl-5.42.0.tar.gz
        sha256: e093ef184d7f9a1b9797e2465296f55510adb6dab8842b0c3ed53329663096dc
      - type: shell
        commands:
          - 'ln -s configure{.gnu,}'
    post-install:
      - 'chmod -R u+w /app/lib/perl5'
    cleanup:
      - '/bin/corelist'
      - '/bin/cpan'
      - '/bin/enc2xs'
      - '/bin/encguess'
      - '/bin/h2ph'
      - '/bin/h2xs'
      - '/bin/instmodsh'
      - '/bin/json_pp'
      - '/bin/libnetcfg'
      - '/bin/perlbug'
      - '/bin/perldoc'
      - '/bin/perlivp'
      - '/bin/perlthanks'
      - '/bin/piconv'
      - '/bin/pl2pm'
      - '/bin/pod*'
      - '/bin/prove'
      - '/bin/ptar*'
      - '/bin/shasum'
      - '/bin/splain'
      - '/bin/xsubpp'
      - '/bin/zipdetails'
      - '/include'
      - '/man'
      - '*.pod'

  - name: perl-libs
    buildsystem: simple
    build-commands:
      - 'perl-libs/install.sh'
    post-install:
      - 'chmod -Rf u+w /app/lib/perl5/site_perl'
    sources:
      - generated-sources.json
    cleanup:
      - '/bin'
      - '/man'

  - name: json-c
    buildsystem: cmake-ninja
    config-opts:
      - '-DCMAKE_BUILD_TYPE=RelWithDebInfo'
      - '-DCMAKE_POLICY_VERSION_MINIMUM=3.5'
    sources:
      - type: archive
        url: https://github.com/json-c/json-c/archive/refs/tags/json-c-0.18-20240915.tar.gz
        sha256: 3112c1f25d39eca661fe3fc663431e130cc6e2f900c081738317fba49d29e298
        x-checker-data:
          type: anitya
          project-id: 1477
          url-template: https://github.com/json-c/json-c/archive/refs/tags/json-c-$version.tar.gz
    cleanup:
      - '/include'
      - '/lib/cmake'
      - '/lib/pkgconfig'
      - '*.a'

  - name: clamav
    buildsystem: cmake-ninja
    build-options:
      append-path: '/usr/lib/sdk/rust-stable/bin'
    config-opts:
      - '-DCMAKE_BUILD_TYPE=RelWithDebInfo'
      - '-DENABLE_MILTER=OFF'
      - '-DENABLE_CLAMONACC=OFF'
      - '-DENABLE_TESTS=OFF'
      - '-DENABLE_EXAMPLES=OFF'
      - '-DENABLE_SYSTEMD=OFF'
      - '-DENABLE_MAN_PAGES=OFF'
      - '-DDATABASE_DIRECTORY=/var/data/clamav'
    sources:
      - type: archive
        url: https://github.com/Cisco-Talos/clamav/archive/refs/tags/clamav-1.5.1.tar.gz
        sha256: 94cd2c7992b6ae69b09951a857777619ec14451b0ae7bb0fc914c8fb26f4d408
        x-checker-data:
          type: anitya
          project-id: 291
          url-template: https://github.com/Cisco-Talos/clamav/archive/refs/tags/clamav-$version.tar.gz
    post-install:
      - 'sed "s/^Example/#Example/" /app/etc/freshclam.conf.sample > /app/etc/freshclam.conf'
    cleanup:
      - '/bin/clamav-config'
      - '/include'
      - '/lib/pkgconfig'
      - '/sbin'
      - '/share/doc'
      - '*.conf.sample'

  - name: clamtk
    buildsystem: simple
    build-commands:
      - 'install -Dm 755 clamtk /app/bin/clamtk'
      - |
        sitelib=$(perl -e 'use Config; print $Config{installsitelib};')
        install -d $sitelib
        cp -r lib $sitelib/ClamTk
      - 'install -Dm 644 clamtk.desktop /app/share/applications/${FLATPAK_ID}.desktop'
      - 'install -Dm 644 images/clamtk.png /app/share/icons/hicolor/128x128/apps/clamtk.png'
      - 'install -Dm 644 com.github.davetheunsub.clamtk.appdata.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml'
    sources:
      - type: archive
        url: https://github.com/dave-theunsub/clamtk/archive/refs/tags/v6.18.tar.gz
        sha256: 26f2916b5df37f0b85ad369a42d032307da6567eb79a08c8fe77ba063f1ce505
        x-checker-data:
          type: anitya
          project-id: 9976
          url-template: https://github.com/dave-theunsub/clamtk/archive/refs/tags/v$version.tar.gz
      - type: patch
        path: 0001-Remove-some-functionality-that-doesn-t-apply-to-Flat.patch
      - type: patch
        path: 0002-Various-Flatpak-specific-config-changes.patch
      - type: patch
        path: 0003-Some-more-icon-fixes.patch
      - type: patch
        path: 0004-Update-releases-in-appdata.patch
      - type: patch
        path: 0005-Flatpak-specific-appdata-changes.patch
